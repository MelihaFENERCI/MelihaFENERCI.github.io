<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oktay Tunalı - CV</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .cv-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 24px;
        }
        h2 {
            color: #16a085;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #16a085;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #11806a;
        }
        #alert-box {
            margin-top: 15px;
            font-size: 13px;
            color: #27ae60;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="cv-card">
        <h1>Oktay Tunalı</h1>
        <h2>Full Stack Developer & Software Specialist</h2>
        <p>
            Backend, frontend ve veritabanı teknolojilerinde uzmanlaşmış, ölçeklenebilir ve güvenli web uygulamaları geliştiren yazılım uzmanı.
        </p>
        
        <button class="btn" onclick="showContact()">İletişim Bilgilerini Göster</button>
        <div id="alert-box"></div>
    </div>

    <script>
        function showContact() {
            const alertBox = document.getElementById('alert-box');
            alertBox.innerHTML = "📧 E-posta adresi ve iletişim detayları yakında burada olacak!";
            
            // 3 saniye sonra mesajı temizle
            setTimeout(() => {
                alertBox.innerHTML = "";
            }, 3000);
        }
    </script>

</body>
</html>
